<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Manage Gallery | IEEE SB</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    background:#05000a;
    color:#e5e7eb;
    position:relative;
    overflow-x:hidden;
}

/* ===== Ambient Glow Background ===== */

body::before,
body::after{
    content:"";
    position:fixed;
    width:400px;
    height:400px;
    background:radial-gradient(circle, rgba(168,85,247,0.35), transparent 70%);
    filter:blur(120px);
    z-index:-1;
}

body::before{
    top:10%;
    left:-150px;
}

body::after{
    bottom:10%;
    right:-150px;
}

/* ================= SIDEBAR ================= */
.sidebar{
    width:260px;
    padding:30px 25px;
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(20px);
    border-right:1px solid rgba(168,85,247,0.15);
}

.profile{
    text-align:center;
    margin-bottom:40px;
}

.profile img{
    width:85px;
    height:85px;
    border-radius:50%;
    margin-bottom:10px;
    border:2px solid rgba(168,85,247,0.5);
}

.profile h3{
    font-size:16px;
    background:linear-gradient(90deg,#a855f7,#e879f9);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.profile span{
    font-size:12px;
    opacity:0.6;
}

.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    padding:12px 15px;
    border-radius:12px;
    margin-bottom:8px;
    cursor:pointer;
    transition:0.3s;
    color:#c4b5fd;
}

.sidebar ul li:hover{
    background:rgba(168,85,247,0.15);
}

/* ================= MAIN ================= */

.main{
    flex:1;
    padding:35px;
}

.main h1{
    margin-bottom:30px;
    background:linear-gradient(90deg,#a855f7,#e879f9);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ================= GRID ================= */

.grid{
    display:grid;
    grid-template-columns:400px 1fr;
    gap:25px;
}

/* MOBILE GRID */

@media (max-width:900px){

.grid{
    grid-template-columns:1fr;
}

}
/* ================= GLASS CARDS ================= */

.card{
    padding:25px;
    border-radius:24px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(25px);
    border:1px solid rgba(168,85,247,0.15);
    transition:0.3s ease;
    position:relative;
    overflow:hidden;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 0 40px rgba(168,85,247,0.2);
}

/* Shine effect */

.card::after{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:60%;
    height:100%;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.25),
        transparent
    );
    transform:skewX(-20deg);
}

.card:hover::after{
    animation:shine 0.8s ease;
}

@keyframes shine{
    to{ left:150%; }
}

/* ================= FORM ================= */

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    border:1px solid rgba(168,85,247,0.2);
    background:rgba(255,255,255,0.06);
    color:white;
    outline:none;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:14px;
    background:linear-gradient(90deg,#5b21b6,#7c3aed);
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 0 20px rgba(168,85,247,0.4);
}

/* ================= GALLERY CARD ================= */

.gallery-card{
    padding:15px;
    border-radius:18px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(168,85,247,0.15);
    margin-bottom:15px;
    transition:0.3s;
}

.gallery-card:hover{
    transform:translateY(-4px);
    box-shadow:0 0 25px rgba(168,85,247,0.2);
}

.gallery-card img{
    width:100%;
    max-height:200px;
    object-fit:cover;
    border-radius:12px;
    margin-bottom:10px;
}

.delete-btn{
    background:#ff4d6d;
}
/* MOBILE SIDEBAR */

@media (max-width:900px){

body{
    flex-direction:column;
}

.sidebar{
    width:100%;
    display:flex;
    overflow-x:auto;
    padding:15px;
}

.sidebar ul{
    display:flex;
    gap:10px;
}

.sidebar ul li{
    white-space:nowrap;
}

.profile{
    display:none;
}

}

</style>
</head>

<body>

<div class="sidebar">
    <div class="profile">
    <img id="adminPhoto" src="">
    <h3 id="adminName">Admin</h3>
    <span id="adminEmail">email@example.com</span>
</div>
    <ul>
        <li onclick="window.location.href='dashboard.html'">Dashboard</li>
        <li onclick="window.location.href='event.html'">Events</li>
        <li onclick="window.location.href='gallery.html'">Gallery</li>
        
        <li id="logoutBtn">Logout</li>
    </ul>
</div>

<div class="main">

  <h1 style="color:#a855f7;margin-bottom:30px;">Gallery Management</h1>

  <div class="grid">

    <!-- LEFT UPLOAD FORM -->
    <div class="card">
      <h3>Add Gallery Image</h3>
      <input type="file" id="imageFile">
      <input type="text" id="caption" placeholder="Caption (optional)">
      <button id="addImage">Upload Image</button>
    </div>

    <!-- RIGHT LIST -->
    <div class="card">
      <h3>All Images</h3>
      <div id="galleryList"></div>
    </div>

  </div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";
import { onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { 
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* LOAD IMAGES */

const galleryList = document.getElementById("galleryList");

async function loadGallery(){
  galleryList.innerHTML="";
  const snapshot = await getDocs(collection(db,"gallery"));

  snapshot.forEach(docSnap=>{
    const data = docSnap.data();

    const div = document.createElement("div");
    div.classList.add("gallery-card");

    div.innerHTML = `
      <img src="${data.imageUrl}">
      <p>${data.caption || ""}</p>
      <button class="delete-btn" data-id="${docSnap.id}">
        Delete
      </button>
    `;

    galleryList.appendChild(div);
  });

  document.querySelectorAll(".delete-btn").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const id = btn.getAttribute("data-id");
      if(confirm("Delete this image?")){
  await deleteDoc(doc(db,"gallery",id));
  loadGallery();
}
    });
  });
}

loadGallery();

/* ADD IMAGE */

document.getElementById("addImage")
  .addEventListener("click", async ()=>{

    const file = document.getElementById("imageFile").files[0];
    const caption = document.getElementById("caption").value;

    if(!file){
      alert("Select image first");
      return;
    }

    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "ieee_gallery");

    const response = await fetch(
  "https://api.cloudinary.com/v1_1/dnbbyeel3/image/upload",
  {
    method:"POST",
    body:formData
  }
);

const data = await response.json();

if(!response.ok){
  console.error("Cloudinary error:", data);
  alert("Image upload failed");
  return;
}

    await addDoc(collection(db,"gallery"),{
      imageUrl:data.secure_url,
      caption:caption,
      createdAt:serverTimestamp()
    });

    document.getElementById("imageFile").value="";
    document.getElementById("caption").value="";

    loadGallery();
});


/* 🚪 Logout */
document.getElementById("logoutBtn")
  .addEventListener("click", () => {
    signOut(auth)
      .then(() => {
        window.location.href = "login.html";
      })
      .catch((error) => {
        console.error("Logout Error:", error);
      });
});

// ================= Auth Protection =================

onAuthStateChanged(auth, (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  // Admin Name
  document.getElementById("adminName").innerText =
      user.displayName || "IEEE Admin";

  // Admin Email
  document.getElementById("adminEmail").innerText =
      user.email;

  // Profile Photo (Cloudinary or default)
  document.getElementById("adminPhoto").src =
      user.photoURL || "https://i.imgur.com/2DhmtJ4.png";
});
</script>

</body>
</html>
