<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IEEE SB Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    background:#05000a;
    color:#e5e7eb;
    position:relative;
    overflow-x:hidden;
}

/* ===== Ambient Purple Glow Background ===== */

body::before,
body::after{
    content:"";
    position:fixed;
    width:400px;
    height:400px;
    background:radial-gradient(circle, rgba(168,85,247,0.35), transparent 70%);
    filter:blur(120px);
    z-index:-1;
}

body::before{
    top:10%;
    left:-150px;
}

body::after{
    bottom:10%;
    right:-150px;
}

/* ================= SIDEBAR ================= */

.sidebar{
    width:260px;
    padding:30px 25px;
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(20px);
    border-right:1px solid rgba(168,85,247,0.15);
}

.profile{
    text-align:center;
    margin-bottom:40px;
}

.profile img{
    width:85px;
    height:85px;
    border-radius:50%;
    margin-bottom:10px;
    border:2px solid rgba(168,85,247,0.5);
}

.profile h3{
    font-size:16px;
    background:linear-gradient(90deg,#a855f7,#e879f9);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.profile span{
    font-size:12px;
    opacity:0.6;
}

.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    padding:12px 15px;
    border-radius:12px;
    margin-bottom:8px;
    cursor:pointer;
    transition:0.3s;
    color:#c4b5fd;
}

.sidebar ul li:hover{
    background:rgba(168,85,247,0.15);
}

/* ================= MAIN ================= */

.main{
    flex:1;
    padding:35px;
}

/* ================= TOPBAR ================= */

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    border:1px solid rgba(168,85,247,0.15);
    margin-bottom:30px;
}

.search{
    padding:8px 15px;
    border-radius:12px;
    border:1px solid rgba(168,85,247,0.2);
    background:rgba(255,255,255,0.06);
    color:white;
    outline:none;
}

.date-box{
    padding:8px 15px;
    border-radius:12px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(168,85,247,0.2);
}

/* ================= SUMMARY ================= */

.summary{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.summary-card{
    padding:25px;
    border-radius:22px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(25px);
    border:1px solid rgba(168,85,247,0.15);
    text-align:center;
    position:relative;
    overflow:hidden;
    transition:0.3s;
}

.summary-card:hover{
    transform:translateY(-6px);
    border-color:rgba(168,85,247,0.4);
}

.summary-card h2{
    font-size:28px;
    font-weight:700;
    background:linear-gradient(90deg,#a855f7,#e879f9);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.summary-card span{
    font-size:13px;
    opacity:0.6;
}

/* ================= PANELS ================= */

.panel{
    padding:25px;
    border-radius:24px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(25px);
    border:1px solid rgba(168,85,247,0.15);
    transition:0.3s ease;
    position:relative;
    overflow:hidden;
}

.panel:hover{
    transform:translateY(-6px);
    box-shadow:0 0 40px rgba(168,85,247,0.2);
}

/* Shine Effect */

.panel::after{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:60%;
    height:100%;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.25),
        transparent
    );
    transform:skewX(-20deg);
}

.panel:hover::after{
    animation:shine 0.8s ease;
}

@keyframes shine{
    to{ left:150%; }
}

.panel-title{
    margin-bottom:15px;
    font-size:14px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:#c4b5fd;
}

/* ================= GRID ================= */

.grid-2{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
    margin-bottom:25px;
}

.grid-2-bottom{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}
/* ================= MOBILE RESPONSIVE ================= */

@media (max-width:900px){

body{
    flex-direction:column;
}

/* Sidebar becomes top navigation */

.sidebar{
    width:100%;
    padding:15px;
}

.profile{
    display:none;
}

.sidebar ul{
    display:flex;
    overflow-x:auto;
    gap:10px;
}

.sidebar ul li{
    white-space:nowrap;
    margin-bottom:0;
}

/* Main padding smaller */

.main{
    padding:20px;
}

/* Topbar stack */

.topbar{
    flex-direction:column;
    gap:10px;
    align-items:flex-start;
}

.search{
    width:100%;
}

/* Grid layouts collapse */

.grid-2{
    grid-template-columns:1fr;
}

.grid-2-bottom{
    grid-template-columns:1fr;
}

}

/* Small phone optimization */

@media (max-width:600px){

.summary{
    grid-template-columns:1fr 1fr;
}

.summary-card{
    padding:18px;
}

.summary-card h2{
    font-size:22px;
}

.panel{
    padding:18px;
}

}
</style>
</head>

<body>
<div class="sidebar">
    <div class="profile">
    <img id="adminPhoto" src="">
    <h3 id="adminName">Admin</h3>
    <span id="adminEmail">email@example.com</span>
</div>
    <ul>
        <li onclick="window.location.href='dashboard.html'">Dashboard</li>
        <li onclick="window.location.href='event.html'">Events</li>
        <li onclick="window.location.href='gallery.html'">Gallery</li>
        
        <li id="logoutBtn">Logout</li>
    </ul>
</div>

<div class="main">

    <div class="topbar">
        <input class="search" placeholder="Search...">
        <div class="date-box" id="currentDate"></div>
    </div>

    <div class="summary">
        <div class="summary-card">
            <h2>16k</h2>
            <span>Total Visitors</span>
        </div>
        <div class="summary-card">
            <h2>194</h2>
            <span>Total Balance</span>
        </div>
        <div class="summary-card">
            <h2>76</h2>
            <span>New Members</span>
        </div>
        <div class="summary-card">
            <h2>42</h2>
            <span>New Orders</span>
        </div>
    </div>

    <div class="grid-2">
        <div class="panel">
            <div class="panel-title">Statistics</div>
            <canvas id="lineChart"></canvas>
        </div>
        <div class="panel">
            <div class="panel-title">Pie Chart</div>
            <canvas id="pieChart"></canvas>
        </div>
    </div>

    <div class="grid-2-bottom">
        <div class="panel">
  <div class="panel-title">Messages</div>

  <div id="messageList"></div>

  <input id="msgInput" placeholder="Write message...">
  <button id="sendMsg">Send</button>

</div>
        <div class="panel">
            <div class="panel-title">Members</div>
            <p>Total Users: 184</p>
            <p>Active: 120</p>
        </div>
    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { 
  getFirestore,
  doc,
  collection,
  addDoc,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ================= Firebase Init =================

const firebaseConfig = {
  apiKey: "AIzaSyAfo4Q0J5NDvarN4WZJ2youBV3rB7YpPpw",
  authDomain: "ieee-visat-website-69d0c.firebaseapp.com",
  projectId: "ieee-visat-website-69d0c",
  storageBucket: "ieee-visat-website-69d0c.firebasestorage.app",
  messagingSenderId: "758234547940",
  appId: "1:758234547940:web:efbb90bebc04c4ef31cef1",
  measurementId: "G-RB7C8DG6GT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


const messageList = document.getElementById("messageList");

/* LIVE MESSAGES */

onSnapshot(collection(db,"messages"), (snapshot)=>{

  messageList.innerHTML="";

  snapshot.forEach(docSnap=>{

    const data = docSnap.data();

    const p = document.createElement("p");

    p.innerText = `${data.name}: ${data.message}`;

    messageList.appendChild(p);

  });

});


/* SEND MESSAGE */

document.getElementById("sendMsg")
.addEventListener("click", async ()=>{

  const msg = document.getElementById("msgInput").value;

  if(!msg) return;

  await addDoc(collection(db,"messages"),{
    name: "Admin",
    message: msg,
    time: serverTimestamp()
  });

  document.getElementById("msgInput").value="";

});
// ================= Auth Protection =================

onAuthStateChanged(auth, (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  // Admin Name
  document.getElementById("adminName").innerText =
      user.displayName || "IEEE Admin";

  // Admin Email
  document.getElementById("adminEmail").innerText =
      user.email;

  // Profile Photo (Cloudinary or default)
  document.getElementById("adminPhoto").src =
      user.photoURL || "https://i.imgur.com/2DhmtJ4.png";
});

// ================= Logout =================

document.querySelector(".sidebar ul li:last-child")
  .addEventListener("click", () => {
    signOut(auth).then(() => {
      window.location.href = "login.html";
    });
});

// ================= Charts =================

const ctx1 = document.getElementById('lineChart');
const ctx2 = document.getElementById('pieChart');

let lineChart = new Chart(ctx1, {
    type: 'line',
    data: {
        labels: ['Jan','Feb','Mar','Apr','May','Jun'],
        datasets: [{
            label: 'Visitors',
            data: [],
            borderColor: '#a855f7',
            backgroundColor: 'rgba(168,85,247,0.2)',
            tension: 0.4,
            fill: true
        }]
    }
});

let pieChart = new Chart(ctx2, {
    type: 'doughnut',
    data: {
        labels: ['Events','Members','Visitors'],
        datasets: [{
            data: [],
            backgroundColor: ['#a855f7','#3b82f6','#10b981']
        }]
    }
});

// ================= Firestore Listeners =================

onSnapshot(doc(db, "visitors", "2026"), (docSnap) => {
    if (docSnap.exists()) {
        const data = docSnap.data();
        lineChart.data.datasets[0].data = [
            data.Jan, data.Feb, data.Mar,
            data.Apr, data.May, data.Jun
        ];
        lineChart.update();
    }
});

onSnapshot(doc(db, "stats", "main"), (docSnap) => {
    if (docSnap.exists()) {
        const data = docSnap.data();
        pieChart.data.datasets[0].data = [
            data.events,
            data.members,
            data.visitors
        ];
        pieChart.update();
    }
});

</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>



</script>

<script>
function updateDate() {

  const today = new Date();

  const options = {
    year: "numeric",
    month: "long",
    day: "numeric"
  };

  const formattedDate = today.toLocaleDateString("en-US", options);

  document.getElementById("currentDate").innerText = formattedDate;
}

updateDate();
</script>
</body>
</html>
